<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Catalogo de Productos</title>
  <style>
    :root {
      --bg: #f4f6f8;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --brand: #0f766e;
      --brand-soft: #ccfbf1;
      --line: #e5e7eb;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: radial-gradient(circle at top right, #d1fae5 0%, var(--bg) 42%);
      color: var(--text);
      min-height: 100vh;
    }

    .app {
      max-width: 760px;
      margin: 0 auto;
      padding: 16px;
    }

    .header {
      background: linear-gradient(135deg, #115e59 0%, #0f766e 65%, #0ea5a5 100%);
      color: #fff;
      border-radius: 18px;
      padding: 18px;
      box-shadow: 0 12px 28px rgba(15, 118, 110, 0.25);
      margin-bottom: 14px;
    }

    .header h1 {
      margin: 0;
      font-size: 1.2rem;
      letter-spacing: 0.2px;
    }

    .header p {
      margin: 8px 0 0;
      font-size: 0.93rem;
      opacity: 0.9;
    }

    .search-wrap {
      position: sticky;
      top: 0;
      z-index: 10;
      background: var(--bg);
      padding: 10px 0 12px;
    }

    .search {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 12px 14px;
      font-size: 1rem;
      background: #fff;
      outline: none;
      transition: border-color .2s, box-shadow .2s;
    }

    .search:focus {
      border-color: var(--brand);
      box-shadow: 0 0 0 4px rgba(15, 118, 110, 0.13);
    }

    .meta {
      margin: 2px 0 12px;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .list {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      padding-bottom: 26px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 12px;
      box-shadow: 0 8px 16px rgba(0, 0, 0, 0.04);
    }

    .name {
      font-weight: 700;
      font-size: 0.98rem;
      margin: 0 0 8px;
      line-height: 1.3;
    }

    .row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      margin-top: 6px;
      font-size: 0.92rem;
    }

    .label { color: var(--muted); }

    .pill {
      display: inline-block;
      font-size: 0.82rem;
      font-weight: 700;
      border-radius: 999px;
      padding: 4px 10px;
      background: var(--brand-soft);
      color: #0f766e;
    }

    .price {
      font-weight: 700;
      font-size: 1rem;
    }

    .empty {
      text-align: center;
      color: var(--muted);
      padding: 24px 12px;
      background: #fff;
      border: 1px dashed var(--line);
      border-radius: 14px;
    }

    @media (min-width: 640px) {
      .list {
        grid-template-columns: 1fr 1fr;
      }
    }
  </style>
</head>

  </main>

    const IVA_RATE = 0.16;
    const money = new Intl.NumberFormat('es-VE', {
      style: 'currency',
      currency: 'USD',
      minimumFractionDigits: 2,
      maximumFractionDigits: 2
    });

    const listEl = document.getElementById('list');
    const metaEl = document.getElementById('meta');
    const searchInput = document.getElementById('searchInput');

    const items = Array.isArray(data?.items) ? data.items : [];

    function getIvaPct(item) {
      return Number(item?.exentoIva) === 1 ? 16 : 0;
    }

    function getFinalPrice(item) {
      const base = Number(item?.precioVentaUnit) || 0;
      const ivaPct = getIvaPct(item);
      return ivaPct > 0 ? base * (1 + IVA_RATE) : base;
    }

    function render(queryText) {
      const query = (queryText || '').trim().toLowerCase();

      const filtered = items.filter((item) => {
        const name = String(item?.itemNombre || '').toLowerCase();
        return name.includes(query);
      });

      metaEl.textContent = 'Mostrando ' + filtered.length + ' de ' + items.length + ' productos';

      if (!filtered.length) {
        listEl.innerHTML = '<div class="empty">No hay productos que coincidan con la busqueda.</div>';
        return;
      }

      listEl.innerHTML = filtered.map((item) => {
        const name = item?.itemNombre || 'Sin nombre';
        const base = Number(item?.precioVentaUnit) || 0;
        const ivaPct = getIvaPct(item);
        const finalPrice = getFinalPrice(item);

        return '' +
          '<article class="card">' +
            '<h2 class="name">' + name + '</h2>' +
            '<div class="row"><span class="label">Precio base</span><strong class="price">' + money.format(base) + '</strong></div>' +
            '<div class="row"><span class="label">IVA</span><span class="pill">' + ivaPct + '%</span></div>' +
            '<div class="row"><span class="label">Precio final</span><strong class="price">' + money.format(finalPrice) + '</strong></div>' +
          '</article>';
      }).join('');
    }

    searchInput.addEventListener('input', function (e) {
      render(e.target.value);
    });

    render('');
  </script>
