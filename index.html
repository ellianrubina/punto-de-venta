<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Punto de Venta</title>
<style>
  :root {
    --naranja: #f4730e;
    --negro: #000000;
    --naranja-oscuro: #c45a08;
    --naranja-claro: #f9a05a;
    --gris-oscuro: #1a1a1a;
    --gris-medio: #2a2a2a;
    --gris-borde: #3a3a3a;
    --texto: #f0f0f0;
    --error: #ff4444;
    --exito: #44cc44;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--negro);
    color: var(--texto);
    font-family: 'Segoe UI', Arial, sans-serif;
    min-height: 100vh;
    padding: 0;
  }
  header {
    background: var(--naranja);
    color: #000;
    padding: 14px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 8px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 12px #0008;
  }
  header h1 { font-size: 1.4rem; font-weight: 800; letter-spacing: 1px; }
  .tasa-widget {
    display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
    background: #0003; border-radius: 8px; padding: 6px 12px;
  }
  .tasa-widget label { font-size: 0.82rem; font-weight: 700; color: #000; }
  .tasa-widget input {
    width: 90px; background: #fff3; border: 1px solid #0004;
    color: #000; font-weight: 700; font-size: 0.95rem;
    padding: 3px 7px; border-radius: 5px; text-align: right;
  }
  .tasa-status { font-size: 0.72rem; color: #0008; }
  .btn-refresh {
    background: #0002; border: none; color: #000; cursor: pointer;
    border-radius: 5px; padding: 4px 8px; font-size: 0.8rem; font-weight: 700;
  }
  .btn-refresh:hover { background: #0004; }
  .main {
    max-width: 960px; margin: 0 auto; padding: 18px 12px 40px;
  }
  .section {
    background: var(--gris-oscuro);
    border: 1px solid var(--gris-borde);
    border-radius: 10px;
    padding: 16px;
    margin-bottom: 16px;
  }
  .section-title {
    color: var(--naranja);
    font-size: 1rem;
    font-weight: 700;
    margin-bottom: 12px;
    border-bottom: 1px solid var(--gris-borde);
    padding-bottom: 8px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  @media(max-width:600px) { .form-grid { grid-template-columns: 1fr; } }
  .form-group { display: flex; flex-direction: column; gap: 4px; }
  .form-group label { font-size: 0.82rem; color: var(--naranja-claro); font-weight: 600; }
  .form-group input, .form-group select {
    background: var(--gris-medio);
    border: 1px solid var(--gris-borde);
    color: var(--texto);
    padding: 9px 11px;
    border-radius: 7px;
    font-size: 0.95rem;
    outline: none;
    transition: border 0.2s;
  }
  .form-group input:focus, .form-group select:focus { border-color: var(--naranja); }
  .form-group input::placeholder { color: #666; }

  /* Producto selector */
  .add-producto {
    display: grid;
    grid-template-columns: 1fr auto auto auto;
    gap: 8px;
    align-items: end;
  }
  @media(max-width:600px) { .add-producto { grid-template-columns: 1fr 1fr; } }
  .producto-search-wrap { position: relative; }
  .producto-search-wrap input {
    width: 100%;
    background: var(--gris-medio);
    border: 1px solid var(--gris-borde);
    color: var(--texto);
    padding: 9px 11px;
    border-radius: 7px;
    font-size: 0.95rem;
    outline: none;
  }
  .producto-search-wrap input:focus { border-color: var(--naranja); }
  .dropdown-list {
    position: absolute;
    top: 100%; left: 0; right: 0;
    background: var(--gris-medio);
    border: 1px solid var(--naranja);
    border-radius: 0 0 8px 8px;
    max-height: 220px;
    overflow-y: auto;
    z-index: 200;
    display: none;
  }
  .dropdown-list.show { display: block; }
  .dropdown-item {
    padding: 9px 12px;
    cursor: pointer;
    font-size: 0.9rem;
    border-bottom: 1px solid var(--gris-borde);
    display: flex; justify-content: space-between; align-items: center;
  }
  .dropdown-item:hover, .dropdown-item.active { background: var(--naranja); color: #000; }
  .dropdown-item .precio-tag { font-size: 0.78rem; font-weight: 700; color: #aaa; }
  .dropdown-item:hover .precio-tag, .dropdown-item.active .precio-tag { color: #000; }
  .qty-input {
    width: 80px;
    background: var(--gris-medio);
    border: 1px solid var(--gris-borde);
    color: var(--texto);
    padding: 9px 8px;
    border-radius: 7px;
    font-size: 0.95rem;
    text-align: center;
    outline: none;
  }
  .qty-input:focus { border-color: var(--naranja); }
  .btn {
    background: var(--naranja);
    color: #000;
    border: none;
    padding: 9px 16px;
    border-radius: 7px;
    font-weight: 700;
    font-size: 0.9rem;
    cursor: pointer;
    transition: background 0.2s;
    white-space: nowrap;
  }
  .btn:hover { background: var(--naranja-oscuro); color: #fff; }
  .btn-outline {
    background: transparent;
    border: 1px solid var(--naranja);
    color: var(--naranja);
  }
  .btn-outline:hover { background: var(--naranja); color: #000; }
  .btn-danger {
    background: #700;
    color: #fff;
    border: none;
    padding: 4px 10px;
    border-radius: 5px;
    cursor: pointer;
    font-size: 0.8rem;
    font-weight: 700;
  }
  .btn-danger:hover { background: var(--error); }

  /* Tabla de items */
  .tabla-items { width: 100%; border-collapse: collapse; margin-top: 10px; }
  .tabla-items th {
    background: var(--naranja);
    color: #000;
    padding: 8px 10px;
    font-size: 0.82rem;
    text-align: left;
  }
  .tabla-items td {
    padding: 7px 10px;
    border-bottom: 1px solid var(--gris-borde);
    font-size: 0.88rem;
    vertical-align: middle;
  }
  .tabla-items tr:hover td { background: #ffffff08; }
  .tabla-items .td-qty {
    display: flex; align-items: center; gap: 5px;
  }
  .tabla-items .td-qty input {
    width: 65px;
    background: var(--gris-medio);
    border: 1px solid var(--gris-borde);
    color: var(--texto);
    padding: 4px 6px;
    border-radius: 5px;
    font-size: 0.88rem;
    text-align: center;
    outline: none;
  }
  .tabla-items .td-qty input:focus { border-color: var(--naranja); }
  .empty-msg { text-align:center; color:#666; padding:20px; font-style:italic; }

  /* Total */
  .totales-box {
    background: var(--gris-medio);
    border: 1px solid var(--naranja);
    border-radius: 10px;
    padding: 14px 18px;
    margin-top: 10px;
  }
  .total-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 5px 0; border-bottom: 1px solid var(--gris-borde);
  }
  .total-row:last-child { border-bottom: none; }
  .total-label { font-size: 0.9rem; color: #aaa; }
  .total-valor { font-size: 1rem; font-weight: 700; color: var(--naranja); }
  .total-grande { font-size: 1.25rem !important; }

  /* Pagomovil fields */
  #pagomovil-fields {
    display: none;
    margin-top: 10px;
    background: var(--gris-medio);
    border-radius: 8px;
    padding: 12px;
    border: 1px solid var(--gris-borde);
  }
  #pagomovil-fields.show { display: block; }

  /* Producto manual */
  .manual-grid {
    display: grid;
    grid-template-columns: 1fr 1fr auto;
    gap: 8px; align-items: end;
  }
  @media(max-width:500px) { .manual-grid { grid-template-columns: 1fr; } }

  /* Toast */
  .toast {
    position: fixed; bottom: 24px; right: 20px;
    background: var(--naranja); color: #000;
    padding: 12px 20px; border-radius: 8px;
    font-weight: 700; font-size: 0.92rem;
    box-shadow: 0 4px 16px #0008;
    z-index: 9999; display: none;
    max-width: 320px;
  }
  .toast.show { display: block; animation: fadeInOut 3s forwards; }
  @keyframes fadeInOut {
    0% { opacity:0; transform:translateY(20px); }
    15% { opacity:1; transform:translateY(0); }
    80% { opacity:1; }
    100% { opacity:0; }
  }
  .op-num { color: var(--naranja-claro); font-size:0.8rem; text-align:right; margin-bottom:4px; }
  .metodo-btns { display:flex; gap:8px; flex-wrap:wrap; margin-top:4px; }
  .metodo-btn {
    flex:1; min-width:100px;
    background: var(--gris-medio);
    border: 2px solid var(--gris-borde);
    color: var(--texto);
    padding: 10px 8px;
    border-radius: 8px;
    font-weight: 700;
    font-size: 0.88rem;
    cursor: pointer;
    text-align: center;
    transition: all 0.15s;
  }
  .metodo-btn.selected { background: var(--naranja); color:#000; border-color: var(--naranja); }
  .metodo-btn:hover { border-color: var(--naranja); }
  .scroll-table { overflow-x: auto; }
  .accion-col { width: 38px; }
  .num-col { width: 34px; text-align:center; }
  @media(max-width:700px) {
    .tabla-items th, .tabla-items td { font-size: 0.78rem; padding: 6px 6px; }
  }
</style>
</head>
<body>
<header>
  <h1>🛒 Punto de Venta</h1>
  <div class="tasa-widget">
    <label>Tasa BCV (Bs/$)</label>
    <input type="number" id="tasaBcv" step="0.01" min="1" placeholder="---" oninput="recalcTotales()"/>
    <button class="btn-refresh" onclick="fetchTasa()" title="Actualizar tasa BCV">&#x21bb; BCV</button>
    <span class="tasa-status" id="tasaStatus"></span>
  </div>
</header>

<div class="main">
  <div class="op-num" id="opNumDisplay"></div>

  <!-- CLIENTE -->
  <div class="section">
    <div class="section-title">📋 Datos del Cliente</div>
    <div class="form-grid">
      <div class="form-group">
        <label>Cédula</label>
        <input type="text" id="clienteCedula" placeholder="V00000000" maxlength="12"/>
      </div>
      <div class="form-group">
        <label>Nombre y Apellido</label>
        <input type="text" id="clienteNombre" placeholder="Nombre completo"/>
      </div>
      <div class="form-group">
        <label>Celular</label>
        <input type="tel" id="clienteCelular" placeholder="04XX-XXXXXXX" maxlength="16"/>
      </div>
    </div>
  </div>

  <!-- AGREGAR PRODUCTOS -->
  <div class="section">
    <div class="section-title">🔍 Agregar Producto</div>
    <div class="add-producto">
      <div class="form-group" style="grid-column:1/-1">
        <label>Buscar producto del inventario</label>
        <div class="producto-search-wrap">
          <input type="text" id="productoSearch" placeholder="Escribe para buscar..." autocomplete="off"
            oninput="filtrarProductos()" onfocus="mostrarDropdown()" onkeydown="navDropdown(event)"/>
          <div class="dropdown-list" id="dropdownList"></div>
        </div>
      </div>
      <div class="form-group">
        <label>Producto seleccionado</label>
        <input type="text" id="productoNombreSelected" readonly placeholder="— ninguno —" style="background:#111;cursor:default;"/>
      </div>
      <div class="form-group">
        <label>Precio USD</label>
        <input type="number" id="productoPrecioSelected" readonly placeholder="0.00" style="background:#111;cursor:default;"/>
      </div>
      <div class="form-group">
        <label>Cantidad</label>
        <input type="number" id="productoQty" class="qty-input" value="1" min="0.001" step="any" style="width:100%;"/>
      </div>
      <div class="form-group" style="justify-content:flex-end;">
        <button class="btn" onclick="agregarItem()" style="width:100%;">➕ Agregar</button>
      </div>
    </div>
  </div>

  <!-- PRODUCTO MANUAL -->
  <div class="section">
    <div class="section-title">✏️ Agregar Producto Manual (no está en la lista)</div>
    <div class="manual-grid">
      <div class="form-group">
        <label>Nombre del producto</label>
        <input type="text" id="manualNombre" placeholder="Descripción del producto"/>
      </div>
      <div class="form-group">
        <label>Precio USD (con IVA)</label>
        <input type="number" id="manualPrecio" placeholder="0.00" step="any" min="0"/>
      </div>
      <div class="form-group">
        <label>Cantidad</label>
        <input type="number" id="manualQty" value="1" min="0.001" step="any"/>
      </div>
      <div class="form-group" style="justify-content:flex-end;">
        <button class="btn btn-outline" onclick="agregarManual()" style="width:100%;">➕ Agregar</button>
      </div>
    </div>
  </div>

  <!-- ITEMS -->
  <div class="section">
    <div class="section-title">🧾 Productos en la Venta</div>
    <div class="scroll-table">
      <table class="tabla-items">
        <thead>
          <tr>
            <th class="num-col">#</th>
            <th>Producto</th>
            <th>P.Unit ($)</th>
            <th>Cantidad</th>
            <th>Subtotal ($)</th>
            <th>Subtotal (Bs)</th>
            <th class="accion-col"></th>
          </tr>
        </thead>
        <tbody id="itemsTbody">
          <tr><td colspan="7" class="empty-msg">Sin productos agregados</td></tr>
        </tbody>
      </table>
    </div>

    <div class="totales-box" style="margin-top:14px;">
      <div class="total-row">
        <span class="total-label">Total en Dólares (USD)</span>
        <span class="total-valor total-grande" id="totalUsd">$ 0.00</span>
      </div>
      <div class="total-row">
        <span class="total-label">Total en Bolívares (Bs)</span>
        <span class="total-valor total-grande" id="totalBs">Bs 0.00</span>
      </div>
    </div>
  </div>

  <!-- METODO DE PAGO -->
  <div class="section">
    <div class="section-title">💳 Método de Pago</div>
    <div class="metodo-btns">
      <button class="metodo-btn" id="btn-efectivo" onclick="selMetodo('efectivo')">💵 Efectivo</button>
      <button class="metodo-btn" id="btn-debito" onclick="selMetodo('debito')">💳 Tarjeta Débito</button>
      <button class="metodo-btn" id="btn-pagomovil" onclick="selMetodo('pagomovil')">📱 Pago Móvil</button>
    </div>
    <div id="pagomovil-fields">
      <div class="form-grid" style="margin-top:8px;">
        <div class="form-group">
          <label>N° de Referencia</label>
          <input type="text" id="pmRef" placeholder="Número de referencia"/>
        </div>
        <div class="form-group">
          <label>Banco</label>
          <select id="pmBanco">
            <option value="">— Seleccionar banco —</option>
            <option value="Banco de Venezuela">Banco de Venezuela</option><option value="Banesco">Banesco</option><option value="Mercantil">Mercantil</option><option value="BBVA Provincial">BBVA Provincial</option><option value="BNC">BNC</option><option value="Banplus">Banplus</option><option value="Bancamiga">Bancamiga</option><option value="Bicentenario">Bicentenario</option><option value="Del Tesoro">Del Tesoro</option><option value="Exterior">Exterior</option><option value="Activo">Activo</option><option value="Sofitasa">Sofitasa</option><option value="Plaza">Plaza</option><option value="Caroni">Caroni</option><option value="Agricola de Venezuela">Agricola de Venezuela</option><option value="100% Banco">100% Banco</option><option value="Bancrecer">Bancrecer</option><option value="Mi Banco">Mi Banco</option><option value="Venezolano de Crédito">Venezolano de Crédito</option><option value="BOD">BOD</option><option value="Citibank">Citibank</option><option value="Fondo Común">Fondo Común</option>
          </select>
        </div>
        <div class="form-group">
          <label>Celular asociado a la cuenta</label>
          <input type="tel" id="pmCelular" placeholder="04XX-XXXXXXX"/>
        </div>
      </div>
    </div>
  </div>

  <!-- GUARDAR -->
  <div style="display:flex; gap:12px; flex-wrap:wrap; justify-content:flex-end; margin-top:4px;">
    <button class="btn btn-outline" onclick="limpiarVenta()" style="min-width:140px;">🗑️ Nueva Venta</button>
    <button class="btn" onclick="guardarVenta()" style="min-width:200px; font-size:1rem; padding:12px 24px;">
      💾 Guardar y Descargar
    </button>
  </div>
</div>

<div class="toast" id="toast"></div>

const BANCOS = ["Banco de Venezuela", "Banesco", "Mercantil", "BBVA Provincial", "BNC", "Banplus", "Bancamiga", "Bicentenario", "Del Tesoro", "Exterior", "Activo", "Sofitasa", "Plaza", "Caroni", "Agricola de Venezuela", "100% Banco", "Bancrecer", "Mi Banco", "Venezolano de Crédito", "BOD", "Citibank", "Fondo Común"];

// ---- ESTADO ----
let items = [];
let metodoPago = '';
let opCounter = parseInt(localStorage.getItem('posOpCounter') || '1');
let dropdownIndex = -1;
let dropdownItems = [];
let selectedProducto = null;

// ---- INIT ----
window.addEventListener('DOMContentLoaded', () => {
  actualizarOpNum();
  fetchTasa();
});

function actualizarOpNum() {
  document.getElementById('opNumDisplay').textContent = `Operación N° ${String(opCounter).padStart(6,'0')}`;
}

// ---- TASA BCV ----
async function fetchTasa() {
  const st = document.getElementById('tasaStatus');
  st.textContent = 'Actualizando...';
  try {
    // Intentar via CORS proxy
    const url = 'https://api.allorigins.win/get?url=' + encodeURIComponent('https://www.bcv.org.ve/');
    const res = await fetch(url, {signal: AbortSignal.timeout(8000)});
    const data = await res.json();
    const html = data.contents;
    // Buscar el valor del dolar en el HTML del BCV
    const match = html.match(/USD[^\d]*(\d{1,3}(?:[.,]\d{3})*[.,]\d{1,4})/i)
      || html.match(/>([\d]{1,3}(?:[,.]\d{3})*[,.]\d{1,4})<\/strong>\s*<\/div>\s*<\/div>\s*<div[^>]*>\s*USD/i)
      || html.match(/id="dolar"[\s\S]{0,300}?<strong>([\d,\.]+)<\/strong>/i);
    if(match) {
      let raw = match[1].replace(/\s/g,'');
      // Normalizar separadores venezolanos: punto = mil, coma = decimal
      // o al reves dependiendo del formato
      raw = raw.replace(/\./g,'X').replace(/,/g,'.').replace(/X/g,'');
      const val = parseFloat(raw);
      if(val > 1) {
        document.getElementById('tasaBcv').value = val.toFixed(2);
        st.textContent = '✓ ' + new Date().toLocaleTimeString('es-VE');
        recalcTotales();
        return;
      }
    }
    st.textContent = '⚠ Manual';
  } catch(e) {
    st.textContent = '⚠ Sin conexión';
  }
}

// ---- BUSQUEDA DROPDOWN ----
function filtrarProductos() {
  const q = document.getElementById('productoSearch').value.trim().toLowerCase();
  const dl = document.getElementById('dropdownList');
  dropdownIndex = -1;
  if(!q) { dl.classList.remove('show'); dropdownItems=[]; return; }
  dropdownItems = PRODUCTOS.filter(p => p.nombre.toLowerCase().includes(q)).slice(0,40);
  if(!dropdownItems.length) { dl.innerHTML='<div class="dropdown-item" style="color:#888;">Sin resultados</div>'; dl.classList.add('show'); return; }
  dl.innerHTML = dropdownItems.map((p,i) =>
    `<div class="dropdown-item" data-i="${i}" onmousedown="seleccionarProducto(${i})">
      <span>${escHtml(p.nombre)}</span>
      <span class="precio-tag">$${p.precio.toFixed(4)}</span>
    </div>`
  ).join('');
  dl.classList.add('show');
}

function mostrarDropdown() {
  if(dropdownItems.length) document.getElementById('dropdownList').classList.add('show');
}

document.addEventListener('click', e => {
  if(!e.target.closest('.producto-search-wrap')) {
    document.getElementById('dropdownList').classList.remove('show');
  }
});

function navDropdown(e) {
  const items = document.querySelectorAll('#dropdownList .dropdown-item[data-i]');
  if(e.key==='ArrowDown') { dropdownIndex=Math.min(dropdownIndex+1,items.length-1); resaltarDropdown(items); e.preventDefault(); }
  else if(e.key==='ArrowUp') { dropdownIndex=Math.max(dropdownIndex-1,0); resaltarDropdown(items); e.preventDefault(); }
  else if(e.key==='Enter' && dropdownIndex>=0) { seleccionarProducto(dropdownIndex); e.preventDefault(); }
  else if(e.key==='Escape') { document.getElementById('dropdownList').classList.remove('show'); }
}

function resaltarDropdown(items) {
  items.forEach((el,i) => el.classList.toggle('active', i===dropdownIndex));
  if(items[dropdownIndex]) items[dropdownIndex].scrollIntoView({block:'nearest'});
}

function seleccionarProducto(i) {
  selectedProducto = dropdownItems[i];
  document.getElementById('productoSearch').value = selectedProducto.nombre;
  document.getElementById('productoNombreSelected').value = selectedProducto.nombre;
  document.getElementById('productoPrecioSelected').value = selectedProducto.precio.toFixed(4);
  document.getElementById('dropdownList').classList.remove('show');
  document.getElementById('productoQty').focus();
}

// ---- AGREGAR ITEM ----
function agregarItem() {
  if(!selectedProducto) { showToast('Selecciona un producto de la lista'); return; }
  const qty = parseFloat(document.getElementById('productoQty').value);
  if(!qty || qty<=0) { showToast('Cantidad inválida'); return; }
  addItemToList(selectedProducto.nombre, selectedProducto.precio, qty, false);
  // reset
  selectedProducto = null;
  document.getElementById('productoSearch').value='';
  document.getElementById('productoNombreSelected').value='';
  document.getElementById('productoPrecioSelected').value='';
  document.getElementById('productoQty').value='1';
}

function agregarManual() {
  const nombre = document.getElementById('manualNombre').value.trim();
  const precio = parseFloat(document.getElementById('manualPrecio').value);
  const qty = parseFloat(document.getElementById('manualQty').value);
  if(!nombre) { showToast('Ingresa el nombre del producto'); return; }
  if(!precio||precio<0) { showToast('Precio inválido'); return; }
  if(!qty||qty<=0) { showToast('Cantidad inválida'); return; }
  addItemToList(nombre, precio, qty, true);
  document.getElementById('manualNombre').value='';
  document.getElementById('manualPrecio').value='';
  document.getElementById('manualQty').value='1';
}

function addItemToList(nombre, precio, qty, esManual) {
  // Si ya existe, sumar cantidad
  const existing = items.find(it => it.nombre===nombre && it.precio===precio);
  if(existing) { existing.qty += qty; }
  else { items.push({id: Date.now(), nombre, precio, qty, esManual}); }
  renderItems();
  recalcTotales();
  showToast('Producto agregado ✓');
}

// ---- RENDER ----
function renderItems() {
  const tbody = document.getElementById('itemsTbody');
  const tasa = parseFloat(document.getElementById('tasaBcv').value)||0;
  if(!items.length) {
    tbody.innerHTML='<tr><td colspan="7" class="empty-msg">Sin productos agregados</td></tr>';
    return;
  }
  tbody.innerHTML = items.map((it,i) => {
    const sub = it.precio * it.qty;
    const subBs = tasa ? sub*tasa : 0;
    return `<tr>
      <td class="num-col">${i+1}</td>
      <td>${escHtml(it.nombre)}${it.esManual?' <span style="color:var(--naranja-claro);font-size:0.72rem;">[manual]</span>':''}</td>
      <td>$${it.precio.toFixed(4)}</td>
      <td>
        <div class="td-qty">
          <input type="number" value="${it.qty}" min="0.001" step="any"
            oninput="cambiarQty(${it.id}, this.value)" style="width:70px;"/>
        </div>
      </td>
      <td>$${sub.toFixed(2)}</td>
      <td>${tasa ? 'Bs '+fmtBs(subBs) : '—'}</td>
      <td><button class="btn-danger" onclick="eliminarItem(${it.id})">✕</button></td>
    </tr>`;
  }).join('');
}

function cambiarQty(id, val) {
  const it = items.find(i=>i.id===id);
  if(it) { it.qty = parseFloat(val)||0; recalcTotales(); renderItems_noFocus(); }
}

function renderItems_noFocus() { renderItems(); }

function eliminarItem(id) {
  items = items.filter(i=>i.id!==id);
  renderItems(); recalcTotales();
}

function recalcTotales() {
  renderItems();
  const tasa = parseFloat(document.getElementById('tasaBcv').value)||0;
  const total = items.reduce((s,it)=>s+it.precio*it.qty,0);
  document.getElementById('totalUsd').textContent = '$ ' + total.toFixed(2);
  document.getElementById('totalBs').textContent = tasa ? 'Bs ' + fmtBs(total*tasa) : '— (sin tasa)';
}

// ---- METODO PAGO ----
function selMetodo(m) {
  metodoPago = m;
  ['efectivo','debito','pagomovil'].forEach(x=>{
    document.getElementById('btn-'+x).classList.toggle('selected', x===m);
  });
  const pm = document.getElementById('pagomovil-fields');
  pm.classList.toggle('show', m==='pagomovil');
}

// ---- GUARDAR ----
function guardarVenta() {
  // Validaciones
  const cedula = document.getElementById('clienteCedula').value.trim();
  const nombre = document.getElementById('clienteNombre').value.trim();
  const celular = document.getElementById('clienteCelular').value.trim();
  if(!cedula) { showToast('Ingresa la cédula del cliente'); return; }
  if(!nombre) { showToast('Ingresa el nombre del cliente'); return; }
  if(!items.length) { showToast('Agrega al menos un producto'); return; }
  if(!metodoPago) { showToast('Selecciona el método de pago'); return; }
  const tasa = parseFloat(document.getElementById('tasaBcv').value)||0;
  const total = items.reduce((s,it)=>s+it.precio*it.qty,0);

  let pagoInfo = '';
  if(metodoPago==='pagomovil') {
    const ref = document.getElementById('pmRef').value.trim();
    const banco = document.getElementById('pmBanco').value;
    const pmCel = document.getElementById('pmCelular').value.trim();
    if(!ref||!banco||!pmCel) { showToast('Completa los datos del Pago Móvil'); return; }
    pagoInfo = `  Referencia   : ${ref}\n  Banco        : ${banco}\n  Celular      : ${pmCel}`;
  }

  const ahora = new Date();
  const dd = String(ahora.getDate()).padStart(2,'0');
  const mm = String(ahora.getMonth()+1).padStart(2,'0');
  const aa = String(ahora.getFullYear()).slice(2);
  const hh = String(ahora.getHours()).padStart(2,'0');
  const mi = String(ahora.getMinutes()).padStart(2,'0');
  const ss = String(ahora.getSeconds()).padStart(2,'0');
  const numOp = String(opCounter).padStart(6,'0');
  const cedulaFile = cedula.replace(/[^a-zA-Z0-9]/g,'');

  const nombreArchivo = `${dd}.${mm}.${aa}--${hh}.${mi}.${ss}--${cedulaFile}.txt`;

  const linea = '='.repeat(56);
  const lineaM = '-'.repeat(56);

  let contenido = `${linea}
         REGISTRO DE VENTA - PUNTO DE VENTA
${linea}
  N° Operación  : ${numOp}
  Fecha         : ${dd}/${mm}/20${aa}
  Hora          : ${hh}:${mi}:${ss}
${lineaM}
  DATOS DEL CLIENTE
${lineaM}
  Cédula        : ${cedula}
  Nombre        : ${nombre}
  Celular       : ${celular||'No indicado'}
${lineaM}
  PRODUCTOS ADQUIRIDOS
${lineaM}
`;
  items.forEach((it,i) => {
    const sub = it.precio * it.qty;
    const subBs = tasa ? sub*tasa : 0;
    const qtyStr = Number.isInteger(it.qty) ? it.qty : it.qty.toFixed(3);
    contenido += `  ${String(i+1).padStart(2)}. ${it.nombre}${it.esManual?' [MANUAL]':''}\n`;
    contenido += `      Precio unitario : $${it.precio.toFixed(4)}\n`;
    contenido += `      Cantidad        : ${qtyStr}\n`;
    contenido += `      Subtotal USD    : $${sub.toFixed(2)}\n`;
    if(tasa) contenido += `      Subtotal Bs     : Bs ${fmtBs(subBs)}\n`;
    contenido += '\n';
  });

  contenido += `${lineaM}
  RESUMEN DE TOTALES
${lineaM}
  Total USD     : $${total.toFixed(2)}
  Tasa BCV      : ${tasa ? 'Bs '+tasa.toFixed(2)+' / $1' : 'No registrada'}
  Total Bs      : ${tasa ? 'Bs '+fmtBs(total*tasa) : 'No disponible'}
${lineaM}
  MÉTODO DE PAGO
${lineaM}
  Método        : ${metodoPago==='efectivo'?'Efectivo':metodoPago==='debito'?'Tarjeta Débito':'Pago Móvil'}
${pagoInfo ? pagoInfo+'\n' : ''}${linea}
  Gracias por su compra
${linea}
`;

  // Descargar
  const blob = new Blob([contenido], {type:'text/plain;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href=url; a.download=nombreArchivo; a.click();
  URL.revokeObjectURL(url);

  // Incrementar contador
  opCounter++;
  localStorage.setItem('posOpCounter', opCounter);
  showToast('✅ Venta guardada y descargada');
  setTimeout(()=>{ if(confirm('¿Iniciar nueva venta?')) limpiarVenta(); }, 1200);
}

function limpiarVenta() {
  items=[];
  metodoPago='';
  selectedProducto=null;
  document.getElementById('clienteCedula').value='';
  document.getElementById('clienteNombre').value='';
  document.getElementById('clienteCelular').value='';
  document.getElementById('productoSearch').value='';
  document.getElementById('productoNombreSelected').value='';
  document.getElementById('productoPrecioSelected').value='';
  document.getElementById('productoQty').value='1';
  document.getElementById('manualNombre').value='';
  document.getElementById('manualPrecio').value='';
  document.getElementById('manualQty').value='1';
  document.getElementById('pmRef').value='';
  document.getElementById('pmBanco').value='';
  document.getElementById('pmCelular').value='';
  ['efectivo','debito','pagomovil'].forEach(x=>document.getElementById('btn-'+x).classList.remove('selected'));
  document.getElementById('pagomovil-fields').classList.remove('show');
  renderItems(); recalcTotales();
  actualizarOpNum();
}

// ---- UTILS ----
function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function fmtBs(n) {
  return n.toLocaleString('es-VE',{minimumFractionDigits:2,maximumFractionDigits:2});
}
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent=msg;
  t.classList.remove('show');
  void t.offsetWidth;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),3100);
}
