
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Punto de Venta</title>
<style>
body {
    background:#000;
    color:#fff;
    font-family:Arial;
}
.container {padding:10px;}
input, select, button {
    width:100%;
    margin:5px 0;
    padding:10px;
}
button {
    background:#f4730e;
    color:#000;
    border:none;
}
.item-row {display:flex; gap:5px;}
</style>
</head>
<body>
<div class="container">
<h2>Punto de Venta</h2>

<h3>Cliente</h3>
<input id="cedula" placeholder="Cédula">
<input id="nombre" placeholder="Nombre">
<input id="telefono" placeholder="Teléfono">

<h3>Productos</h3>
<select id="producto"></select>
<input id="cantidad" type="number" placeholder="Cantidad">
<button onclick="addItem()">Agregar</button>

<div id="lista"></div>

<h3>Pago</h3>
<select id="metodo">
<option>Efectivo</option>
<option>Tarjeta</option>
<option>PagoMovil</option>
</select>
<input id="ref" placeholder="Referencia">
<input id="banco" placeholder="Banco">
<input id="telPago" placeholder="Teléfono PagoMovil">

<h3>Dólar BCV</h3>
<input id="tasa" placeholder="Tasa manual">

<h3>Total</h3>
<p id="total"></p>

<button onclick="guardar()">Finalizar Venta</button>

</div>

let carrito = [];

let select = document.getElementById("producto");
productos.forEach(p => {
    let opt = document.createElement("option");
    opt.value = p.name;
    opt.text = p.name + " $" + p.price;
    select.appendChild(opt);
});

function addItem(){
    let nombre = document.getElementById("producto").value;
    let cantidad = parseInt(document.getElementById("cantidad").value);
    let prod = productos.find(p=>p.name===nombre);
    carrito.push({nombre, cantidad, price:prod.price});
    render();
}

function render(){
    let div = document.getElementById("lista");
    div.innerHTML="";
    let total=0;
    carrito.forEach(i=>{
        total+= i.price*i.cantidad;
        div.innerHTML += `<p>${i.nombre} x${i.cantidad}</p>`;
    });
    document.getElementById("total").innerText = "Total $"+total;
}

function guardar(){
    let now = new Date();
    let nombreArchivo = now.toISOString().replace(/[:T]/g,'-').split('.')[0];

    let texto = "VENTA\n";
    carrito.forEach(i=>{
        texto += i.nombre+" x"+i.cantidad+"\n";
    });

    let blob = new Blob([texto], {type:"text/plain"});
    let a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = nombreArchivo+".txt";
    a.click();
}
