<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Punto de Venta</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg: #0d1117;
  --surface: #161b22;
  --surface2: #1c2329;
  --border: #30363d;
  --accent: #00d4aa;
  --accent2: #ff6b35;
  --accent3: #7c6fff;
  --text: #e6edf3;
  --muted: #7d8590;
  --danger: #f85149;
  --success: #3fb950;
  --warn: #d29922;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Syne',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
input,select,textarea{font-family:'Syne',sans-serif;font-size:.9rem}

/* ── LAYOUT ── */
.shell{display:grid;grid-template-columns:1fr 380px;grid-template-rows:auto 1fr;height:100vh;overflow:hidden}
@media(max-width:900px){.shell{grid-template-columns:1fr;grid-template-rows:auto auto 1fr auto}}

/* ── TOPBAR ── */
.topbar{grid-column:1/-1;display:flex;align-items:center;gap:16px;padding:14px 20px;border-bottom:1px solid var(--border);background:var(--surface)}
.topbar h1{font-size:1.15rem;font-weight:800;letter-spacing:-.5px;color:var(--accent)}
.topbar h1 span{color:var(--text);font-weight:400}
.rate-pill{margin-left:auto;display:flex;align-items:center;gap:8px;font-family:'DM Mono',monospace;font-size:.8rem;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:6px 12px}
.rate-dot{width:8px;height:8px;border-radius:50%;background:var(--success);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
#rateVal{color:var(--accent);font-weight:500}

/* ── LEFT PANEL ── */
.left{display:flex;flex-direction:column;overflow:hidden;border-right:1px solid var(--border)}
.search-bar{padding:14px 16px;border-bottom:1px solid var(--border)}
.search-wrap{display:flex;gap:8px}
.search-wrap input{flex:1;background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:10px 14px;outline:none;transition:border-color .2s}
.search-wrap input:focus{border-color:var(--accent)}
.filter-tabs{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap}
.tab{font-size:.72rem;padding:4px 10px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;transition:.2s}
.tab.active,.tab:hover{border-color:var(--accent);color:var(--accent)}

.prod-grid{flex:1;overflow-y:auto;display:grid;grid-template-columns:repeat(auto-fill,minmax(175px,1fr));gap:10px;padding:14px 16px;align-content:start}
.prod-grid::-webkit-scrollbar{width:4px}
.prod-grid::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}

.prod-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px;cursor:pointer;transition:.15s;position:relative;overflow:hidden}
.prod-card::before{content:'';position:absolute;inset:0;background:var(--accent);opacity:0;transition:.15s}
.prod-card:hover{border-color:var(--accent);transform:translateY(-1px)}
.prod-card:hover::before{opacity:.04}
.prod-card:active{transform:translateY(0)}
.prod-card h3{font-size:.78rem;font-weight:600;line-height:1.35;color:var(--text);margin-bottom:8px}
.prod-card .price{font-family:'DM Mono',monospace;font-size:.82rem;color:var(--accent);font-weight:500}
.prod-card .iva-badge{font-size:.65rem;color:var(--muted);margin-top:2px}
.prod-card .stock-badge{position:absolute;top:8px;right:8px;font-size:.6rem;font-family:'DM Mono',monospace;background:var(--surface2);color:var(--muted);border-radius:4px;padding:2px 5px}

/* ── RIGHT PANEL ── */
.right{display:flex;flex-direction:column;overflow:hidden;background:var(--surface)}
.cart-header{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.cart-header h2{font-size:1rem;font-weight:700}
.btn-clear{font-size:.75rem;color:var(--danger);background:transparent;border:1px solid var(--danger);border-radius:6px;padding:4px 10px;cursor:pointer;transition:.2s}
.btn-clear:hover{background:var(--danger);color:#fff}

.cart-body{flex:1;overflow-y:auto;padding:12px}
.cart-body::-webkit-scrollbar{width:4px}
.cart-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
.empty-cart{text-align:center;color:var(--muted);padding:40px 20px;font-size:.85rem}
.empty-icon{font-size:2.5rem;margin-bottom:8px}

.cart-item{display:flex;gap:10px;align-items:center;padding:10px;background:var(--surface2);border-radius:8px;margin-bottom:8px;border:1px solid var(--border)}
.cart-item-name{flex:1;font-size:.78rem;line-height:1.3;font-weight:600}
.cart-item-price{font-family:'DM Mono',monospace;font-size:.75rem;color:var(--accent);white-space:nowrap}
.qty-ctrl{display:flex;align-items:center;gap:6px}
.qty-btn{width:22px;height:22px;border-radius:5px;border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:.9rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.15s}
.qty-btn:hover{border-color:var(--accent);color:var(--accent)}
.qty-input{width:38px;text-align:center;background:var(--surface);border:1px solid var(--border);color:var(--text);border-radius:5px;padding:2px 4px;font-size:.8rem;font-family:'DM Mono',monospace}
.qty-input:focus{outline:none;border-color:var(--accent)}
.rm-btn{background:transparent;border:none;color:var(--muted);cursor:pointer;font-size:1rem;padding:2px;transition:.15s}
.rm-btn:hover{color:var(--danger)}

/* ── TOTALS ── */
.totals{padding:12px 16px;border-top:1px solid var(--border);border-bottom:1px solid var(--border)}
.total-row{display:flex;justify-content:space-between;font-size:.8rem;color:var(--muted);margin-bottom:4px}
.total-row.big{font-size:1rem;font-weight:700;color:var(--text);margin-top:6px}
.total-row.ves{font-size:.85rem;color:var(--accent3);font-family:'DM Mono',monospace}

/* ── CHECKOUT SECTION ── */
.checkout{padding:12px 16px;display:flex;flex-direction:column;gap:10px;overflow-y:auto;max-height:340px}
.checkout::-webkit-scrollbar{width:4px}
.checkout::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
.section-label{font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:4px}
.inp{width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:9px 12px;outline:none;transition:border-color .2s;font-size:.85rem}
.inp:focus{border-color:var(--accent)}
.inp-row{display:grid;grid-template-columns:1fr 1fr;gap:8px}

.pay-methods{display:flex;gap:6px}
.pay-btn{flex:1;padding:8px 4px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--muted);font-size:.72rem;font-weight:600;cursor:pointer;text-align:center;transition:.2s}
.pay-btn.active{border-color:var(--accent);color:var(--accent);background:rgba(0,212,170,.08)}
.pay-details{display:none;gap:8px;flex-direction:column}
.pay-details.show{display:flex}

.btn-checkout{width:100%;padding:13px;background:var(--accent);color:#0d1117;font-family:'Syne',sans-serif;font-size:.9rem;font-weight:800;border:none;border-radius:10px;cursor:pointer;transition:.2s;letter-spacing:.3px}
.btn-checkout:hover{background:#00f0c4;transform:translateY(-1px)}
.btn-checkout:active{transform:translateY(0)}
.btn-checkout:disabled{background:var(--border);color:var(--muted);cursor:not-allowed;transform:none}

/* ── MODAL ── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;align-items:center;justify-content:center;padding:20px}
.modal-overlay.open{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:16px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;padding:28px}
.modal h2{font-size:1.2rem;font-weight:800;margin-bottom:4px;color:var(--accent)}
.modal .sub{font-size:.8rem;color:var(--muted);margin-bottom:20px}
.receipt{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:16px;font-family:'DM Mono',monospace;font-size:.75rem;color:var(--text);white-space:pre-wrap;line-height:1.7;max-height:300px;overflow-y:auto}
.modal-btns{display:flex;gap:10px;margin-top:16px}
.modal-btn{flex:1;padding:10px;border-radius:8px;border:none;font-family:'Syne',sans-serif;font-weight:700;font-size:.85rem;cursor:pointer;transition:.2s}
.modal-btn.primary{background:var(--accent);color:#0d1117}
.modal-btn.primary:hover{background:#00f0c4}
.modal-btn.secondary{background:var(--surface2);color:var(--text);border:1px solid var(--border)}
.modal-btn.secondary:hover{border-color:var(--accent)}

/* ── TOAST ── */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(100px);background:var(--success);color:#0d1117;padding:10px 20px;border-radius:8px;font-size:.82rem;font-weight:700;z-index:200;transition:.3s;opacity:0}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}
</style>
</head>
<body>
<div class="shell">
  <!-- TOP BAR -->
  <header class="topbar">
    <h1>POS <span>// Punto de Venta</span></h1>
    <div class="rate-pill">
      <span class="rate-dot"></span>
      <span>BCV: <strong id="rateVal">–</strong> Bs/USD</span>
      <span id="rateDate" style="color:var(--muted);font-size:.7rem;margin-left:4px"></span>
    </div>
  </header>

  <!-- LEFT: PRODUCTS -->
  <main class="left">
    <div class="search-bar">
      <div class="search-wrap">
        <input id="searchInput" type="search" placeholder="🔍  Buscar producto..." autocomplete="off"/>
      </div>
      <div class="filter-tabs">
        <button class="tab active" data-tipo="all">Todos</button>
        <button class="tab" data-tipo="producto">Productos</button>
        <button class="tab" data-tipo="compuesto">Compuestos</button>
      </div>
    </div>
    <div id="prodGrid" class="prod-grid"></div>
  </main>

  <!-- RIGHT: CART -->
  <aside class="right">
    <div class="cart-header">
      <h2>🛒 Carrito</h2>
      <button class="btn-clear" onclick="clearCart()">Vaciar</button>
    </div>
    <div id="cartBody" class="cart-body">
      <div class="empty-cart"><div class="empty-icon">🛍️</div>Agrega productos al carrito</div>
    </div>
    <div class="totals" id="totalsBox" style="display:none">
      <div class="total-row"><span>Subtotal (sin IVA)</span><span id="tSub">$0.00</span></div>
      <div class="total-row"><span>IVA</span><span id="tIva">$0.00</span></div>
      <div class="total-row big"><span>TOTAL USD</span><span id="tUsd">$0.00</span></div>
      <div class="total-row ves"><span>TOTAL Bs.</span><span id="tBs">–</span></div>
    </div>

    <div class="checkout" id="checkoutSection" style="display:none">
      <!-- CLIENTE -->
      <div>
        <div class="section-label">Datos del Cliente</div>
        <div style="display:flex;flex-direction:column;gap:6px">
          <input id="cCedula" class="inp" type="text" placeholder="Cédula / RIF" maxlength="12"/>
          <input id="cNombre" class="inp" type="text" placeholder="Nombre completo"/>
          <input id="cCelular" class="inp" type="tel" placeholder="Celular (04XX-XXXXXXX)"/>
        </div>
      </div>

      <!-- MÉTODO DE PAGO -->
      <div>
        <div class="section-label">Método de Pago</div>
        <div class="pay-methods">
          <button class="pay-btn" data-pay="efectivo" onclick="setPay('efectivo')">💵 Efectivo</button>
          <button class="pay-btn" data-pay="debito" onclick="setPay('debito')">💳 Débito</button>
          <button class="pay-btn" data-pay="pago-movil" onclick="setPay('pago-movil')">📱 PagoMóvil</button>
        </div>
        <!-- PagoMóvil extra fields -->
        <div id="pagoDetails" class="pay-details" style="margin-top:8px">
          <input id="pmRef" class="inp" placeholder="N° de referencia"/>
          <input id="pmBanco" class="inp" placeholder="Banco"/>
          <input id="pmCel" class="inp" placeholder="Celular asociado a la cuenta"/>
        </div>
      </div>

      <button class="btn-checkout" id="btnCheckout" onclick="openModal()" disabled>Registrar Venta</button>
    </div>
  </aside>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h2>✅ Resumen de Venta</h2>
    <p class="sub">Revisa el comprobante antes de guardar</p>
    <div id="receiptBox" class="receipt"></div>
    <div class="modal-btns">
      <button class="modal-btn secondary" onclick="closeModal()">Cancelar</button>
      <button class="modal-btn primary" onclick="saveAndClose()">💾 Guardar TXT</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

const IVA = 0.16;
let rate = null;
let rateDate = '';
let cart = {};
let payMethod = null;
let filterTipo = 'all';
let searchQ = '';

// ── BCV RATE ──
async function fetchRate() {
  const proxies = [
    'https://api.allorigins.win/get?url=' + encodeURIComponent('https://www.bcv.org.ve'),
    'https://corsproxy.io/?' + encodeURIComponent('https://www.bcv.org.ve')
  ];
  for (const url of proxies) {
    try {
      const res = await fetch(url, {signal: AbortSignal.timeout(8000)});
      const text = url.includes('allorigins') ? JSON.parse(await res.text()).contents : await res.text();
      const match = text.match(/id="dolar"[\s\S]*?<strong>([\d,.]+)<\/strong>/i) ||
                    text.match(/USD[\s\S]{0,200}?(\d{1,3}(?:[,\.]\d{3})*(?:[,\.]\d{2}))/i);
      if (match) {
        const raw = match[1].replace(/\./g,'').replace(',','.');
        const num = parseFloat(raw);
        if (num > 1 && num < 1000000) {
          rate = num;
          rateDate = new Date().toLocaleDateString('es-VE');
          document.getElementById('rateVal').textContent = rate.toLocaleString('es-VE',{minimumFractionDigits:2});
          document.getElementById('rateDate').textContent = rateDate;
          updateTotals();
          return;
        }
      }
    } catch(e) {}
  }
  // fallback manual
  document.getElementById('rateVal').textContent = 'N/D – ingresa manual';
  document.getElementById('rateVal').style.cursor = 'pointer';
  document.getElementById('rateVal').onclick = () => {
    const v = prompt('Tasa BCV (Bs/USD):');
    if (v && !isNaN(parseFloat(v))) {
      rate = parseFloat(v);
      rateDate = 'Manual';
      document.getElementById('rateVal').textContent = rate.toLocaleString('es-VE',{minimumFractionDigits:2});
      document.getElementById('rateDate').textContent = '(manual)';
      updateTotals();
    }
  };
}
fetchRate();
setInterval(fetchRate, 60*60*1000);

// ── PRODUCTS ──
function getPrice(item) {
  const base = Number(item.precioVentaUnit)||0;
  return item.exentoIva === 1 ? base * (1+IVA) : base;
}
function getIvaAmt(item) {
  return item.exentoIva === 1 ? (Number(item.precioVentaUnit)||0)*IVA : 0;
}

function renderProducts() {
  const q = searchQ.toLowerCase();
  const grid = document.getElementById('prodGrid');
  const filtered = PRODUCTS.filter(p => {
    const nameOk = p.itemNombre.toLowerCase().includes(q);
    const tipoOk = filterTipo === 'all' || p.itemTipo === filterTipo;
    return nameOk && tipoOk;
  });
  if (!filtered.length) { grid.innerHTML = '<p style="color:var(--muted);font-size:.85rem;grid-column:1/-1">Sin resultados</p>'; return; }
  grid.innerHTML = filtered.map(p => {
    const fp = getPrice(p);
    return `<div class="prod-card" onclick="addToCart(${p.itemId})">
      <div class="stock-badge">${Math.floor(p.stock)} uds</div>
      <h3>${p.itemNombre}</h3>
      <div class="price">$${fp.toFixed(2)}</div>
      <div class="iva-badge">${p.exentoIva===1?'+ IVA 16%':'IVA incl.'}</div>
    </div>`;
  }).join('');
}
renderProducts();

document.getElementById('searchInput').addEventListener('input', e => { searchQ=e.target.value; renderProducts(); });
document.querySelectorAll('.tab').forEach(t => t.addEventListener('click', () => {
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
  t.classList.add('active');
  filterTipo = t.dataset.tipo;
  renderProducts();
}));

// ── CART ──
function addToCart(id) {
  const prod = PRODUCTS.find(p=>p.itemId===id);
  if (!prod) return;
  if (!cart[id]) cart[id]={prod, qty:1};
  else cart[id].qty++;
  renderCart();
  toast(`+ ${prod.itemNombre}`);
}

function removeFromCart(id) { delete cart[id]; renderCart(); }
function setQty(id, val) {
  const q = parseFloat(val)||0;
  if (q<=0) { removeFromCart(id); return; }
  cart[id].qty = q;
  renderCart();
}

function clearCart() {
  if (!Object.keys(cart).length) return;
  if (confirm('¿Vaciar carrito?')) { cart={}; renderCart(); }
}

function renderCart() {
  const body = document.getElementById('cartBody');
  const keys = Object.keys(cart);
  const totBox = document.getElementById('totalsBox');
  const ckBox = document.getElementById('checkoutSection');
  const btn = document.getElementById('btnCheckout');
  if (!keys.length) {
    body.innerHTML = '<div class="empty-cart"><div class="empty-icon">🛍️</div>Agrega productos al carrito</div>';
    totBox.style.display='none'; ckBox.style.display='none';
    return;
  }
  body.innerHTML = keys.map(id => {
    const {prod,qty} = cart[id];
    const fp = getPrice(prod);
    const sub = fp * qty;
    return `<div class="cart-item">
      <div style="flex:1;min-width:0">
        <div class="cart-item-name">${prod.itemNombre}</div>
        <div class="cart-item-price">$${fp.toFixed(2)} c/u · $${sub.toFixed(2)}</div>
      </div>
      <div class="qty-ctrl">
        <button class="qty-btn" onclick="setQty(${id},${qty-1})">−</button>
        <input class="qty-input" type="number" min="0.1" step="0.1" value="${qty}" onchange="setQty(${id},this.value)"/>
        <button class="qty-btn" onclick="setQty(${id},${qty+1})">+</button>
      </div>
      <button class="rm-btn" onclick="removeFromCart(${id})">✕</button>
    </div>`;
  }).join('');
  totBox.style.display=''; ckBox.style.display='';
  updateTotals();
  const formOk = document.getElementById('cCedula').value && document.getElementById('cNombre').value && payMethod;
  btn.disabled = !formOk;
}

function updateTotals() {
  let sub=0, iva=0;
  Object.values(cart).forEach(({prod,qty}) => {
    const base = Number(prod.precioVentaUnit)||0;
    const ivaAmt = prod.exentoIva===1 ? base*IVA : 0;
    sub += base * qty;
    iva += ivaAmt * qty;
  });
  const total = sub + iva;
  document.getElementById('tSub').textContent = '$'+sub.toFixed(2);
  document.getElementById('tIva').textContent = '$'+iva.toFixed(2);
  document.getElementById('tUsd').textContent = '$'+total.toFixed(2);
  document.getElementById('tBs').textContent = rate ? (total*rate).toLocaleString('es-VE',{minimumFractionDigits:2}) + ' Bs.' : 'Sin tasa BCV';
}

// ── PAYMENT ──
function setPay(method) {
  payMethod = method;
  document.querySelectorAll('.pay-btn').forEach(b=>b.classList.toggle('active', b.dataset.pay===method));
  document.getElementById('pagoDetails').classList.toggle('show', method==='pago-movil');
  checkForm();
}

function checkForm() {
  const ok = document.getElementById('cCedula').value.trim() &&
             document.getElementById('cNombre').value.trim() &&
             payMethod;
  document.getElementById('btnCheckout').disabled = !ok;
}
['cCedula','cNombre','cCelular'].forEach(id=>document.getElementById(id).addEventListener('input',checkForm));

// ── RECEIPT ──
function buildReceipt() {
  const now = new Date();
  const fecha = now.toLocaleDateString('es-VE');
  const hora = now.toLocaleTimeString('es-VE');
  const cedula = document.getElementById('cCedula').value.trim();
  const nombre = document.getElementById('cNombre').value.trim();
  const celular = document.getElementById('cCelular').value.trim();
  let sub=0, iva=0;
  const lines = Object.values(cart).map(({prod,qty}) => {
    const base = Number(prod.precioVentaUnit)||0;
    const ivaAmt = prod.exentoIva===1 ? base*IVA : 0;
    const fp = base + ivaAmt;
    sub += base*qty; iva += ivaAmt*qty;
    return `  ${prod.itemNombre.padEnd(28,' ').slice(0,28)}  x${String(qty).padStart(4)}  $${(fp*qty).toFixed(2).padStart(8)}`;
  });
  const total = sub+iva;
  const totalBs = rate ? (total*rate).toLocaleString('es-VE',{minimumFractionDigits:2})+' Bs.' : 'Sin tasa';
  let payLine = `Método de pago : ${payMethod.toUpperCase()}`;
  if (payMethod==='pago-movil') {
    payLine += `\nReferencia     : ${document.getElementById('pmRef').value}`;
    payLine += `\nBanco          : ${document.getElementById('pmBanco').value}`;
    payLine += `\nCel. cuenta    : ${document.getElementById('pmCel').value}`;
  }
  return `=========================================
        COMPROBANTE DE VENTA
=========================================
Fecha          : ${fecha}
Hora           : ${hora}
Tasa BCV       : ${rate ? rate.toLocaleString('es-VE',{minimumFractionDigits:2})+' Bs/USD' : 'N/D'}
-----------------------------------------
CLIENTE
  Cédula/RIF   : ${cedula}
  Nombre       : ${nombre}
  Celular      : ${celular||'–'}
-----------------------------------------
PRODUCTOS
${lines.join('\n')}
-----------------------------------------
  Subtotal (sin IVA) : $${sub.toFixed(2)}
  IVA (16%)          : $${iva.toFixed(2)}
-----------------------------------------
  TOTAL USD          : $${total.toFixed(2)}
  TOTAL Bs.          : ${totalBs}
=========================================
${payLine}
=========================================`;
}

let currentReceipt = '';
function openModal() {
  currentReceipt = buildReceipt();
  document.getElementById('receiptBox').textContent = currentReceipt;
  document.getElementById('modalOverlay').classList.add('open');
}
function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); }

function saveAndClose() {
  const blob = new Blob([currentReceipt], {type:'text/plain;charset=utf-8'});
  const a = document.createElement('a');
  const fecha = new Date().toISOString().slice(0,10);
  const nombre = document.getElementById('cNombre').value.trim().replace(/\s+/g,'_') || 'cliente';
  a.href = URL.createObjectURL(blob);
  a.download = `venta_${nombre}_${fecha}.txt`;
  a.click();
  URL.revokeObjectURL(a.href);
  closeModal();
  toast('✅ Venta guardada');
  setTimeout(()=>{ cart={}; renderCart(); document.getElementById('cCedula').value=''; document.getElementById('cNombre').value=''; document.getElementById('cCelular').value=''; document.getElementById('pmRef').value=''; document.getElementById('pmBanco').value=''; document.getElementById('pmCel').value=''; payMethod=null; document.querySelectorAll('.pay-btn').forEach(b=>b.classList.remove('active')); document.getElementById('pagoDetails').classList.remove('show'); }, 400);
}

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'), 2000);
}

// Close modal on overlay click
document.getElementById('modalOverlay').addEventListener('click', e=>{ if(e.target===e.currentTarget) closeModal(); });
</script>
